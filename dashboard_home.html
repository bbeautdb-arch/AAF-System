<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAF — หน้าหลัก</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen">

<div class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <span class="text-2xl">🪵</span>
    <div>
      <h1 class="text-white font-bold text-base">AAF Sales System</h1>
      <p id="welcome-text" class="text-gray-400 text-xs"></p>
    </div>
  </div>
  <div class="flex items-center gap-3">
    <span id="role-badge" class="text-xs px-3 py-1 rounded-full font-semibold"></span>
    <button onclick="doLogout()"
      class="text-xs text-gray-500 hover:text-red-400 border border-gray-600 hover:border-red-500/50 rounded-lg px-3 py-1.5 transition">
      ออกจากระบบ
    </button>
  </div>
</div>

<div class="max-w-2xl mx-auto px-6 py-10">
  <p class="text-gray-500 text-sm mb-6">เลือกหน้าที่ต้องการ</p>
  <div id="pages-container" class="grid grid-cols-1 gap-4"></div>
  <div id="sales-note" class="hidden mt-6 bg-amber-900/20 border border-amber-500/20 rounded-xl p-4">
    <p class="text-amber-400 text-xs font-semibold mb-1">📌 หมายเหตุ</p>
    <p class="text-amber-200/60 text-xs">ข้อมูลที่แสดงจะ filter เฉพาะของคุณอัตโนมัติ</p>
  </div>
</div>

<script>
const PAGES = {
  admin: [
    { href: 'production_plan.html', icon: '🏭', title: 'แผนผลิตประจำวัน',
      desc: 'กรอกความหนา/ชม.ผลิต · เป้า 4x8 อัตโนมัติ · Rev.04',
      color: 'amber', badge: 'Admin' },
    { href: 'history_database.html', icon: '📊', title: 'ฐานข้อมูลประวัติการขาย',
      desc: 'ยอดขาย 2014–2026 · Timeline · Insights · Health Score · Price Trend',
      color: 'green', badge: 'ทุกคน' },
    { href: 'sales_analytics.html',  icon: '🏆', title: 'Sales Analytics',
      desc: 'ยอดขายแยกตามเซลส์ · Follow-up list · Export CSV',
      color: 'purple', badge: 'ทุกคน' },
    { href: 'history_dashboard.html',icon: '📜', title: 'ประวัติการโหลด',
      desc: 'Archive ยอดปิดเดือนย้อนหลัง',
      color: 'blue', badge: 'Admin' },
    { href: 'access_log.html',icon: '🔒', title: 'บันทึกการเข้าใช้งาน',
      desc: 'ใครเข้าเมื่อไร · ความถี่ · พยายามเข้าไม่สำเร็จ',
      color: 'red', badge: 'Admin เท่านั้น' },
  ],
  sales: [
    { href: 'history_database.html', icon: '📊', title: 'ฐานข้อมูลประวัติการขาย',
      desc: 'ยอดขาย · Timeline · Health Score',
      color: 'green', badge: '' },
    { href: 'sales_analytics.html',  icon: '🏆', title: 'Sales Analytics',
      desc: 'ยอดขายของฉัน · Follow-up list · Export CSV',
      color: 'purple', badge: '' },
  ],
};

const COLORS = {
  amber:  { border: 'border-amber-500/30',  hover: 'hover:border-amber-400/60',  arrow: 'group-hover:text-amber-400' },
  green:  { border: 'border-green-500/30',  hover: 'hover:border-green-400/60',  arrow: 'group-hover:text-green-400' },
  purple: { border: 'border-purple-500/30', hover: 'hover:border-purple-400/60', arrow: 'group-hover:text-purple-400' },
  blue:   { border: 'border-blue-500/30',   hover: 'hover:border-blue-400/60',   arrow: 'group-hover:text-blue-400' },
  red:    { border: 'border-red-500/30',    hover: 'hover:border-red-400/60',    arrow: 'group-hover:text-red-400' },
};

const sess = sessionStorage.getItem('aaf_user');
if(!sess) { window.location.href = 'login.html'; }
const user = JSON.parse(sess);

document.getElementById('welcome-text').textContent = `สวัสดี, ${user.name}`;
const badge = document.getElementById('role-badge');
if(user.role === 'admin') {
  badge.textContent = '👑 ผู้บริหาร';
  badge.className = 'text-xs px-3 py-1 rounded-full font-semibold bg-amber-900/40 text-amber-400 border border-amber-500/30';
} else {
  badge.textContent = `🏷 เซลส์`;
  badge.className = 'text-xs px-3 py-1 rounded-full font-semibold bg-blue-900/40 text-blue-400 border border-blue-500/30';
  document.getElementById('sales-note').classList.remove('hidden');
}

if(user.salesman) sessionStorage.setItem('aaf_filter_salesman', user.salesman);
else sessionStorage.removeItem('aaf_filter_salesman');

const pages = PAGES[user.role] || PAGES.sales;
const container = document.getElementById('pages-container');
container.innerHTML = pages.map(p => {
  const c = COLORS[p.color];
  return `<a href="${p.href}" class="block bg-gray-800 border ${c.border} ${c.hover} rounded-xl p-5 transition group">
    <div class="flex items-center gap-4">
      <div class="text-3xl">${p.icon}</div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2">
          <p class="text-white font-semibold ${c.arrow} transition">${p.title}</p>
          ${p.badge ? `<span class="text-xs bg-gray-700 text-gray-400 px-2 py-0.5 rounded-full">${p.badge}</span>` : ''}
        </div>
        <p class="text-gray-400 text-sm mt-0.5">${p.desc}</p>
      </div>
      <div class="text-gray-600 ${c.arrow} transition text-xl flex-shrink-0">→</div>
    </div>
  </a>`;
}).join('');

function doLogout() {
  if(!confirm('ออกจากระบบ?')) return;
  sessionStorage.clear();
  window.location.href = 'login.html';
}
</script>
</body>
</html>
