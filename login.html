<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAF Sales System — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0d1117; }
  input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px #1c2333 inset !important; -webkit-text-fill-color: #e2e8f0 !important; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-sm">
  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="text-5xl mb-3">🪵</div>
    <h1 class="text-2xl font-bold text-white">AAF Sales System</h1>
    <p class="text-gray-500 text-sm mt-1">กรุณาเข้าสู่ระบบ</p>
  </div>

  <!-- Card -->
  <div class="bg-gray-800 border border-gray-700 rounded-2xl p-6 shadow-xl">
    <div id="error-msg" class="hidden mb-4 bg-red-900/40 border border-red-500/40 text-red-400 text-sm rounded-lg px-4 py-3 text-center">
      ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wider">ชื่อผู้ใช้</label>
        <input id="username" type="text" placeholder="เช่น nok, kim, admin"
          class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition text-sm"
          onkeydown="if(event.key==='Enter') document.getElementById('password').focus()">
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wider">รหัสผ่าน</label>
        <div class="relative">
          <input id="password" type="password" placeholder="••••••••"
            class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition text-sm pr-10"
            onkeydown="if(event.key==='Enter') doLogin()">
          <button onclick="togglePw()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 text-xs">👁</button>
        </div>
      </div>
      <button onclick="doLogin()"
        class="w-full bg-green-600 hover:bg-green-500 active:bg-green-700 text-white font-semibold py-3 rounded-lg transition text-sm mt-2">
        เข้าสู่ระบบ
      </button>
    </div>
  </div>

  <p class="text-center text-gray-700 text-xs mt-6">AAF Export Co., Ltd.</p>
</div>

<script>
// ===== USER DATABASE =====
// role: admin = ดูได้ทุกหน้า | sales = ดูเฉพาะที่กำหนด
const USERS = {
  // ผู้บริหาร
  'admin':    { password: 'AAF@2026',    role: 'admin',  name: 'Admin',       salesman: null },
  'boss':     { password: 'Boss@2026',   role: 'admin',  name: 'ผู้บริหาร',    salesman: null },

  // เซลส์
  'nok':      { password: 'Nok@2026',    role: 'sales',  name: 'Nok',         salesman: 'Nok' },
  'kim':      { password: 'Kim@2026',    role: 'sales',  name: 'Kim',         salesman: 'Kim' },
  'lek':      { password: 'Lek@2026',    role: 'sales',  name: 'Lek',         salesman: 'Lek' },
  'tor':      { password: 'Tor@2026',    role: 'sales',  name: 'Tor',         salesman: 'Tor' },
  'angkana':  { password: 'Ang@2026',    role: 'sales',  name: 'K.Angkana',   salesman: 'K.Angkana' },
  'than':     { password: 'Than@2026',   role: 'sales',  name: 'Than',        salesman: 'Than' },
};

// ===== PAGES BY ROLE =====
const PAGES = {
  admin: [
    { href: 'history_database.html', icon: '📊', title: 'ฐานข้อมูลประวัติการขาย',  desc: 'ยอดขาย 2014–2026 · Timeline · Insights · Health Score', color: 'green' },
    { href: 'sales_analytics.html',  icon: '🏆', title: 'Sales Analytics',          desc: 'ยอดขายแยกตามเซลส์ · Follow-up list · Export CSV',       color: 'purple' },
    { href: 'history_dashboard.html',icon: '📜', title: 'ประวัติการโหลด',           desc: 'Archive ยอดปิดเดือนย้อนหลัง',                            color: 'blue' },
  ],
  sales: [
    { href: 'history_database.html', icon: '📊', title: 'ฐานข้อมูลประวัติการขาย',  desc: 'ยอดขาย · Timeline · Insights',                           color: 'green' },
    { href: 'sales_analytics.html',  icon: '🏆', title: 'Sales Analytics',          desc: 'ยอดขายของฉัน · Follow-up list',                          color: 'purple' },
  ],
};

const COLOR = {
  green:  'border-green-500/30 hover:border-green-400/60 group-hover:text-green-400',
  purple: 'border-purple-500/30 hover:border-purple-400/60 group-hover:text-purple-400',
  blue:   'border-blue-500/30 hover:border-blue-400/60 group-hover:text-blue-400',
};

function togglePw() {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
}

function doLogin() {
  const user = document.getElementById('username').value.trim().toLowerCase();
  const pass = document.getElementById('password').value.trim();
  const errEl = document.getElementById('error-msg');

  if(!user || !pass) { errEl.classList.remove('hidden'); return; }

  const found = USERS[user];
  if(!found || found.password !== pass) {
    errEl.classList.remove('hidden');
    document.getElementById('password').value = '';
    return;
  }

  // บันทึก session
  sessionStorage.setItem('aaf_user', JSON.stringify({
    username: user,
    name: found.name,
    role: found.role,
    salesman: found.salesman,
    loginAt: new Date().toISOString(),
  }));

  // ไปหน้า dashboard
  window.location.href = 'dashboard_home.html';
}

// ถ้า login อยู่แล้ว ไปหน้า dashboard เลย
const sess = sessionStorage.getItem('aaf_user');
if(sess) window.location.href = 'dashboard_home.html';

// focus username
document.getElementById('username').focus();
</script>
</body>
</html>
