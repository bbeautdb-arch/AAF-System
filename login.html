<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAF Sales System — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0d1117; }
  input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px #1c2333 inset !important; -webkit-text-fill-color: #e2e8f0 !important; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-sm">
  <div class="text-center mb-8">
    <div class="text-5xl mb-3">🪵</div>
    <h1 class="text-2xl font-bold text-white">AAF Sales System</h1>
    <p class="text-gray-500 text-sm mt-1">กรุณาเข้าสู่ระบบ</p>
  </div>

  <div class="bg-gray-800 border border-gray-700 rounded-2xl p-6 shadow-xl">
    <div id="error-msg" class="hidden mb-4 bg-red-900/40 border border-red-500/40 text-red-400 text-sm rounded-lg px-4 py-3 text-center">
      ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wider">ชื่อผู้ใช้</label>
        <input id="username" type="text" placeholder="เช่น nok, kim, admin"
          class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition text-sm"
          onkeydown="if(event.key==='Enter') document.getElementById('password').focus()">
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wider">รหัสผ่าน</label>
        <div class="relative">
          <input id="password" type="password" placeholder="••••••••"
            class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition text-sm pr-10"
            onkeydown="if(event.key==='Enter') doLogin()">
          <button onclick="togglePw()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 text-xs">👁</button>
        </div>
      </div>
      <button id="btn-login" onclick="doLogin()"
        class="w-full bg-green-600 hover:bg-green-500 active:bg-green-700 text-white font-semibold py-3 rounded-lg transition text-sm mt-2">
        เข้าสู่ระบบ
      </button>
    </div>
  </div>

  <p class="text-center text-gray-700 text-xs mt-6">AAF Export Co., Ltd.</p>
</div>

<script>
// ⚙️ ตั้งค่า Log Endpoint (ใส่ URL จาก Google Apps Script ที่ deploy แล้ว)
const LOG_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwcerDqFFb0cYXmCsIz3LX79-IF_eX4XEA5CK_vgtpXCObS8xKrBDvfLFNSSArEy8KZ/exec';
const LOG_SECRET    = 'aaf2026secretkey';  // ต้องตรงกับใน AppsScript_Code.gs

const USERS = {
  'admin':    { password: 'AAF@2026',    role: 'admin',  name: 'Admin',       salesman: null },
  'boss':     { password: 'Boss@2026',   role: 'admin',  name: 'ผู้บริหาร',    salesman: null },
  'nok':      { password: 'Nok@2026',    role: 'sales',  name: 'Nok',         salesman: 'Nok' },
  'kim':      { password: 'Kim@2026',    role: 'sales',  name: 'Kim',         salesman: 'Kim' },
  'lek':      { password: 'Lek@2026',    role: 'sales',  name: 'Lek',         salesman: 'Lek' },
  'tor':      { password: 'Tor@2026',    role: 'sales',  name: 'Tor',         salesman: 'Tor' },
  'angkana':  { password: 'Ang@2026',    role: 'sales',  name: 'K.Angkana',   salesman: 'K.Angkana' },
  'than':     { password: 'Than@2026',   role: 'sales',  name: 'Than',        salesman: 'Than' },
};

function togglePw() {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
}

function detectDevice() {
  const ua = navigator.userAgent;
  let os = 'Unknown OS';
  if (/Windows/.test(ua)) os = 'Windows';
  else if (/Mac OS/.test(ua) && !/iPhone|iPad/.test(ua)) os = 'Mac';
  else if (/iPhone/.test(ua)) os = 'iPhone';
  else if (/iPad/.test(ua)) os = 'iPad';
  else if (/Android/.test(ua)) os = 'Android';
  else if (/Linux/.test(ua)) os = 'Linux';
  let browser = 'Unknown';
  if (/Edg\//.test(ua)) browser = 'Edge';
  else if (/Chrome\//.test(ua) && !/Edg\//.test(ua)) browser = 'Chrome';
  else if (/Safari\//.test(ua) && !/Chrome/.test(ua)) browser = 'Safari';
  else if (/Firefox\//.test(ua)) browser = 'Firefox';
  return `${browser} on ${os}`;
}

// ยิง log แบบ fire-and-forget ไม่บล็อก UX (ไม่รอผลลัพธ์)
function logAttempt(username, success, role) {
  if (!LOG_ENDPOINT || LOG_ENDPOINT.includes('PASTE_YOUR')) return; // ยังไม่ได้ตั้งค่า — ข้าม

  const payload = {
    username: username, success: success, role: role || '',
    device: detectDevice(), ua: navigator.userAgent,
  };

  // พยายามดึง IP + ที่ตั้งคร่าวๆ ก่อนส่ง (ฟรี ไม่ต้อง API key)
  fetch('https://ipapi.co/json/')
    .then(r => r.json())
    .then(geo => {
      payload.ip = geo.ip || '';
      payload.city = geo.city || '';
      payload.country = geo.country_name || '';
    })
    .catch(() => {})
    .finally(() => {
      fetch(LOG_ENDPOINT, {
        method: 'POST',
        mode: 'no-cors', // Apps Script ไม่รองรับ CORS preflight ปกติ ใช้ no-cors แทน (fire-and-forget)
        headers: {'Content-Type': 'text/plain'},
        body: JSON.stringify(payload),
      }).catch(()=>{});
    });
}

function doLogin() {
  const user = document.getElementById('username').value.trim().toLowerCase();
  const pass = document.getElementById('password').value.trim();
  const errEl = document.getElementById('error-msg');

  if(!user || !pass) { errEl.classList.remove('hidden'); return; }

  const found = USERS[user];
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'กำลังตรวจสอบ...';

  if(!found || found.password !== pass) {
    errEl.classList.remove('hidden');
    document.getElementById('password').value = '';
    logAttempt(user, false, '');
    setTimeout(()=>{ btn.disabled=false; btn.textContent='เข้าสู่ระบบ'; }, 600);
    return;
  }

  logAttempt(user, true, found.role);

  sessionStorage.setItem('aaf_user', JSON.stringify({
    username: user, name: found.name, role: found.role,
    salesman: found.salesman, loginAt: new Date().toISOString(),
  }));

  setTimeout(()=>{ window.location.href = 'dashboard_home.html'; }, 300);
}

const sess = sessionStorage.getItem('aaf_user');
if(sess) window.location.href = 'dashboard_home.html';

document.getElementById('username').focus();
</script>
</body>
</html>
