<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แผนผลิตประจำวัน — Rev.04</title>
<style>
  :root{
    --bg:#12181b; --panel:#1a2226; --panel2:#202a2f; --ink:#e8edee; --sub:#93a3a8;
    --line1:#e8975a; --line1-soft:#3a2c1f;
    --line2:#5db3d6; --line2-soft:#1c2f38;
    --line3:#8bc48a; --line3-soft:#1f2f22;
    --amber:#f2c14e; --today:#33422f; --grid:#2a3438; --danger:#e06a5f; --ok:#5fbf7a;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Bai Jamjuree','Sarabun','TH Sarabun New','Segoe UI',sans-serif;}
  header{padding:18px 20px 14px;border-bottom:1px solid var(--grid);position:sticky;top:0;background:var(--bg);z-index:30;}
  header .top{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  h1{font-size:1.3rem;margin:0;font-weight:700;}
  h1 small{display:block;font-weight:400;font-size:.76rem;color:var(--sub);margin-top:2px;}
  #clock{font-variant-numeric:tabular-nums;font-size:.9rem;color:var(--sub);}
  .userbar{display:flex;align-items:center;gap:10px;font-size:.85rem;color:var(--sub);}
  .userbar b{color:var(--ink);}
  .badge{padding:2px 9px;border-radius:999px;font-size:.7rem;font-weight:700;}
  .badge.admin{background:#3a2c1f;color:var(--line1);}
  .badge.production{background:#1c2f38;color:var(--line2);}
  .btn{border:1px solid var(--grid);background:var(--panel);color:var(--ink);padding:7px 14px;border-radius:8px;font-size:.82rem;cursor:pointer;font-weight:600;}
  .btn:hover{background:var(--panel2);}
  .btn.primary{background:#1d4ed8;border-color:#1d4ed8;color:#fff;}
  .btn.danger{background:transparent;border-color:var(--danger);color:var(--danger);padding:3px 9px;font-size:.75rem;}
  .toolbar{display:flex;gap:10px;align-items:center;margin-top:14px;flex-wrap:wrap;}
  .toolbar input[type=month]{background:var(--panel);border:1px solid var(--grid);color:var(--ink);padding:7px 10px;border-radius:8px;font-size:.85rem;}
  .tabs{display:flex;gap:8px;}
  .tab{border:1px solid var(--grid);background:var(--panel);color:var(--ink);padding:8px 16px;border-radius:999px;font-size:.88rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;}
  .tab .dot{width:9px;height:9px;border-radius:50%;}
  .tab[data-line="Line 1"] .dot{background:var(--line1);} .tab[data-line="Line 2"] .dot{background:var(--line2);} .tab[data-line="Line 3"] .dot{background:var(--line3);}
  .tab.active{background:var(--panel2);border-color:currentColor;}
  .tab[data-line="Line 1"].active{color:var(--line1);} .tab[data-line="Line 2"].active{color:var(--line2);} .tab[data-line="Line 3"].active{color:var(--line3);}
  #syncstatus{font-size:.75rem;color:var(--sub);}
  #syncstatus.saving{color:var(--amber);}
  #syncstatus.ok{color:var(--ok);}
  #syncstatus.err{color:var(--danger);}

  main{padding:16px 20px 60px;}
  .linewrap{display:none;} .linewrap.active{display:block;}
  .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
  .card{background:var(--panel);border:1px solid var(--grid);border-radius:10px;padding:12px 14px;}
  .card .label{font-size:.7rem;color:var(--sub);text-transform:uppercase;letter-spacing:.03em;}
  .card .value{font-size:1.4rem;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums;}
  .card .value span{font-size:.8rem;font-weight:500;color:var(--sub);}

  .daysrow{display:flex;gap:10px;overflow-x:auto;padding-bottom:14px;}
  .daycard{
    flex:0 0 auto; background:var(--panel); border:1px solid var(--grid); border-radius:12px;
    min-width:158px; overflow:hidden;
  }
  .daycard.today{border-color:var(--amber); box-shadow:0 0 0 1px var(--amber);}
  .daycard .dayhead{
    background:var(--panel2); padding:8px 10px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--grid);
  }
  .daycard .dayhead .num{font-weight:800;font-size:1.05rem;}
  .daycard .dayhead .dow{color:var(--sub);font-size:.72rem;}
  .runcol{border-bottom:1px solid var(--grid); padding:8px 10px;}
  .runcol:last-child{border-bottom:none;}
  .runcol .rowline{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:6px;font-size:.74rem;color:var(--sub);}
  select.thickness-sel, input.hr-input, input.note-input{
    width:100%; background:var(--panel2); border:1px solid var(--grid); color:var(--ink);
    padding:5px 7px; border-radius:6px; font-size:.82rem; margin-bottom:6px;
  }
  .calc-line{display:flex; justify-content:space-between; font-size:.78rem; padding:2px 0;}
  .calc-line .k{color:var(--sub);}
  .calc-line .v{font-variant-numeric:tabular-nums;font-weight:700;}
  .l1 .calc-line .v{color:var(--line1);} .l2 .calc-line .v{color:var(--line2);} .l3 .calc-line .v{color:var(--line3);}
  .emptyday{padding:16px 10px; text-align:center; color:var(--sub); font-size:.82rem;}
  .addrun-btn{
    width:100%; padding:8px; background:none; border:1px dashed var(--grid); color:var(--sub);
    border-radius:8px; cursor:pointer; font-size:.78rem; margin-top:4px;
  }
  .addrun-btn:hover{color:var(--ink); border-color:var(--sub);}
  .rm-btn{background:none;border:none;color:var(--danger);cursor:pointer;font-size:.85rem;padding:0 4px;}

  footer{padding:16px 20px 40px;color:var(--sub);font-size:.78rem;border-top:1px solid var(--grid);margin-top:10px;}
  @media (max-width:640px){ h1{font-size:1.05rem;} }
</style>
</head>
<body>

<header>
  <div class="top">
    <h1>แผนผลิตประจำวัน <small>AAF · Advance Asia Fiber — เป้าการผลิตรายวัน (Rev.04)</small></h1>
    <div style="display:flex;align-items:center;gap:16px;">
      <div class="userbar" id="userbar"></div>
      <div id="clock"></div>
    </div>
  </div>
  <div class="toolbar">
    <div class="tabs" id="tabs"></div>
    <input type="month" id="monthPicker">
    <span id="syncstatus"></span>
    <span style="flex:1"></span>
    <button class="btn" id="backBtn" style="display:none">← ระบบขาย</button>
    <button class="btn" id="logoutBtn">ออกจากระบบ</button>
  </div>
</header>

<main id="main"></main>

<footer>
  เป้า 4x8 คำนวณอัตโนมัติจาก: STD P/hr (ตามความหนา+Line) × ชม.ผลิต × Eff ของ Line × จำนวนแผ่นต่อเพรส · ข้อมูลซิงค์ผ่าน Google Sheet แบบเรียลไทม์
</footer>

<script>
/* ============== CONFIG ============== */
const API_ENDPOINT = 'https://script.google.com/macros/s/AKfycbxkh2u5qiN4o9OqrHCTH5N4SSAzNzLGmduJxFakDgLnBpeX6KMwYcKh2mh5hGxLrQwAEg/exec';
const API_SECRET = 'aaf-prodplan-2026'; // ต้องตรงกับ SHARED_SECRET ในไฟล์ Apps Script

/* ============== STANDARDS (จากตาราง KPI) ============== */
const STD_PHR = {
  1.6:{'Line 1':8.0,'Line 2':8.5,'Line 3':7.0},
  1.8:{'Line 1':7.9,'Line 2':7.8,'Line 3':6.0},
  2.0:{'Line 1':7.8,'Line 2':7.5,'Line 3':7.5},
  2.1:{'Line 1':7.8,'Line 2':7.3,'Line 3':7.2},
  2.2:{'Line 1':7.8,'Line 2':7.3,'Line 3':7.2},
  2.3:{'Line 1':7.5,'Line 2':7.2,'Line 3':7.0},
  2.5:{'Line 1':7.5,'Line 2':7.2,'Line 3':7.0},
  2.7:{'Line 1':7.5,'Line 2':7.0,'Line 3':7.0},
  2.8:{'Line 1':7.3,'Line 2':7.0,'Line 3':6.7},
  3.0:{'Line 1':7.3,'Line 2':6.8,'Line 3':6.7},
  3.2:{'Line 1':7.0,'Line 2':6.8,'Line 3':6.4},
  3.5:{'Line 1':6.0,'Line 2':0.0,'Line 3':6.0},
  3.8:{'Line 1':5.5,'Line 2':0.0,'Line 3':5.5},
  4.0:{'Line 1':4.6,'Line 2':4.5,'Line 3':4.5},
  4.5:{'Line 1':4.3,'Line 2':4.3,'Line 3':4.3},
  4.8:{'Line 1':4.0,'Line 2':3.5,'Line 3':4.0},
  5.0:{'Line 1':3.5,'Line 2':3.0,'Line 3':4.0},
  5.5:{'Line 1':3.3,'Line 2':3.0,'Line 3':3.0},
  6.0:{'Line 1':3.0,'Line 2':3.0,'Line 3':3.0},
  8.0:{'Line 1':0,'Line 2':0,'Line 3':0},
  9.0:{'Line 1':0,'Line 2':0,'Line 3':0},
};
const EFF = {'Line 1':0.76,'Line 2':1.00,'Line 3':0.88};
const BOARDS_PER_PRESS = {'Line 1':56,'Line 2':40,'Line 3':46};
const LINE_CLASS = {'Line 1':'l1','Line 2':'l2','Line 3':'l3'};
const THICKNESS_LIST = Object.keys(STD_PHR).map(Number).sort((a,b)=>a-b);
const DOW = ['อา','จ','อ','พ','พฤ','ศ','ส'];

/* ============== AUTH GUARD ============== */
let SESSION = null;
try { SESSION = JSON.parse(sessionStorage.getItem('aaf_user') || 'null'); } catch(e){ SESSION = null; }
if(!SESSION){
  window.location.href = 'login.html';
}
const IS_ADMIN = SESSION && SESSION.role === 'admin';
const CAN_VIEW = SESSION && (SESSION.role === 'admin' || SESSION.role === 'production');
if(!CAN_VIEW){
  window.location.href = 'login.html';
}

/* ============== STATE ============== */
let currentMonth = new Date().toISOString().slice(0,7); // YYYY-MM
let planData = {}; // key `${line}_${day}` -> array of runs {thickness, hours, note}
let saveTimers = {};

function daysInMonth(ym){
  const [y,m] = ym.split('-').map(Number);
  return new Date(y, m, 0).getDate();
}
function num(v, digits){
  if(v===null||v===undefined||Number.isNaN(Number(v))) return '—';
  digits = digits===undefined?2:digits;
  let s = Number(v).toFixed(digits).replace(/\.0+$/,'').replace(/(\.\d*[1-9])0+$/,'$1');
  let parts = s.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');
  return parts.join('.');
}
function calcRun(line, run){
  const stdphr = (run.thickness && STD_PHR[run.thickness]) ? STD_PHR[run.thickness][line] : 0;
  const hours = Number(run.hours)||0;
  const presses = stdphr * hours * EFF[line];
  const boards = presses * BOARDS_PER_PRESS[line];
  return {stdphr, presses, boards};
}

/* ============== SYNC ============== */
function setSyncStatus(state, msg){
  const el = document.getElementById('syncstatus');
  el.className = state;
  el.textContent = msg || (state==='saving'?'กำลังบันทึก...':state==='ok'?'บันทึกแล้ว':state==='err'?'บันทึกไม่สำเร็จ':'');
}

async function loadMonth(ym){
  setSyncStatus('saving','กำลังโหลดข้อมูล...');
  try{
    const res = await fetch(`${API_ENDPOINT}?action=load&month=${ym}`);
    const json = await res.json();
    planData = {};
    if(json.ok){
      Object.keys(json.data).forEach(key=>{
        // key = YYYY-MM_Line X_day
        const parts = key.split('_');
        const day = parts[parts.length-1];
        const line = parts.slice(1,-1).join('_');
        planData[`${line}_${day}`] = json.data[key] || [];
      });
    }
    setSyncStatus('ok','โหลดข้อมูลล่าสุดแล้ว');
  }catch(err){
    setSyncStatus('err','โหลดข้อมูลไม่สำเร็จ — ตรวจสอบการเชื่อมต่อ API');
    console.error(err);
  }
  renderAll();
}

function saveDay(line, day){
  if(!IS_ADMIN) return;
  const key = `${line}_${day}`;
  clearTimeout(saveTimers[key]);
  saveTimers[key] = setTimeout(async ()=>{
    setSyncStatus('saving');
    try{
      const res = await fetch(API_ENDPOINT, {
        method:'POST',
        headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({
          secret: API_SECRET, month: currentMonth, line, day,
          runs: planData[key] || [], updatedBy: SESSION.username,
        }),
      });
      const json = await res.json();
      setSyncStatus(json.ok ? 'ok' : 'err');
    }catch(err){
      setSyncStatus('err');
      console.error(err);
    }
  }, 500);
}

/* ============== RENDER ============== */
function dowForDay(ym, dayNum){
  const [y,m] = ym.split('-').map(Number);
  return DOW[new Date(y, m-1, dayNum).getDay()];
}

function thicknessOptions(selected){
  let html = `<option value="">—เลือก—</option>`;
  THICKNESS_LIST.forEach(t=>{
    html += `<option value="${t}" ${Number(selected)===t?'selected':''}>${t}</option>`;
  });
  return html;
}

function buildDayCard(line, ym, dayNum, isToday){
  const key = `${line}_${dayNum}`;
  const runs = planData[key] || [];
  const cls = LINE_CLASS[line];
  let html = `<div class="daycard ${isToday?'today':''}" data-key="${key}">
    <div class="dayhead"><span class="num">${dayNum}</span><span class="dow">${dowForDay(ym,dayNum)}</span></div>`;

  if(runs.length===0){
    html += `<div class="emptyday ${cls}">ไม่มีแผน</div>`;
  } else {
    runs.forEach((run, ri)=>{
      const c = calcRun(line, run);
      html += `<div class="runcol ${cls}" data-idx="${ri}">`;
      if(IS_ADMIN){
        html += `<div class="rowline"><span>รอบที่ ${ri+1}</span><button class="rm-btn" onclick="removeRun('${line}',${dayNum},${ri})">ลบ ✕</button></div>
          <select class="thickness-sel" onchange="updateRun('${line}',${dayNum},${ri},'thickness',this.value)">${thicknessOptions(run.thickness)}</select>
          <input class="hr-input" type="number" min="0" step="0.5" placeholder="ชม.ผลิต" value="${run.hours||''}" onchange="updateRun('${line}',${dayNum},${ri},'hours',this.value)">
          <input class="note-input" type="text" placeholder="หมายเหตุ" value="${run.note||''}" onchange="updateRun('${line}',${dayNum},${ri},'note',this.value)">`;
      } else {
        html += `<div class="rowline"><span>รอบที่ ${ri+1}</span><span>${run.thickness?run.thickness+' mm.':'—'}</span></div>`;
      }
      html += `<div class="calc-line"><span class="k">P/hr STD</span><span class="v">${num(c.stdphr,1)}</span></div>
        <div class="calc-line"><span class="k">จำนวนเพรส</span><span class="v">${num(c.presses,1)}</span></div>
        <div class="calc-line"><span class="k">เป้า 4x8</span><span class="v">${num(c.boards,0)}</span></div>`;
      if(!IS_ADMIN && run.note){
        html += `<div class="calc-line" style="color:var(--amber)"><span class="k">หมายเหตุ</span><span class="v">${run.note}</span></div>`;
      }
      html += `</div>`;
    });
  }
  if(IS_ADMIN){
    html += `<button class="addrun-btn" onclick="addRun('${line}',${dayNum})">+ เพิ่มรอบ</button>`;
  }
  html += `</div>`;
  return html;
}

function buildLine(line){
  const ym = currentMonth;
  const nd = daysInMonth(ym);
  const todayStr = new Date().toISOString().slice(0,10);
  const todayDay = todayStr.slice(0,7)===ym ? Number(todayStr.slice(8,10)) : -1;

  let totalTarget=0, activeDays=0, thicknessSet=new Set();
  for(let d=1; d<=nd; d++){
    const runs = planData[`${line}_${d}`] || [];
    if(runs.length) activeDays++;
    runs.forEach(r=>{
      const c = calcRun(line, r);
      totalTarget += c.boards;
      if(r.thickness) thicknessSet.add(r.thickness);
    });
  }

  let html = `<div class="summary">
    <div class="card"><div class="label">รวมเป้าเดือนนี้</div><div class="value">${num(totalTarget,0)} <span>แผ่น 4x8</span></div></div>
    <div class="card"><div class="label">วันเดินเครื่อง</div><div class="value">${activeDays} <span>/ ${nd} วัน</span></div></div>
    <div class="card"><div class="label">ความหนาที่ใช้เดือนนี้</div><div class="value" style="font-size:1rem;">${[...thicknessSet].sort((a,b)=>a-b).join(', ')||'—'} <span>mm.</span></div></div>
  </div>`;

  html += `<div class="daysrow">`;
  for(let d=1; d<=nd; d++){
    html += buildDayCard(line, ym, d, d===todayDay);
  }
  html += `</div>`;
  return html;
}

function renderAll(){
  const lines = ['Line 1','Line 2','Line 3'];
  const mainEl = document.getElementById('main');
  mainEl.innerHTML = lines.map((l,i)=>{
    const active = document.querySelector(`.tab[data-line="${l}"]`)?.classList.contains('active') ?? (i===0);
    return `<div class="linewrap ${active?'active':''}" data-line="${l}">${buildLine(l)}</div>`;
  }).join('');
}

/* ============== EVENT HANDLERS (exposed to window for inline handlers) ============== */
window.updateRun = function(line, day, idx, field, value){
  const key = `${line}_${day}`;
  if(!planData[key]) planData[key] = [];
  if(!planData[key][idx]) planData[key][idx] = {};
  if(field==='thickness') value = value ? Number(value) : '';
  if(field==='hours') value = value ? Number(value) : '';
  planData[key][idx][field] = value;
  renderAll();
  saveDay(line, day);
};
window.addRun = function(line, day){
  const key = `${line}_${day}`;
  if(!planData[key]) planData[key] = [];
  planData[key].push({thickness:'', hours:'', note:''});
  renderAll();
  saveDay(line, day);
};
window.removeRun = function(line, day, idx){
  const key = `${line}_${day}`;
  if(planData[key]){
    planData[key].splice(idx,1);
  }
  renderAll();
  saveDay(line, day);
};

/* ============== INIT ============== */
function initTabs(){
  const tabsEl = document.getElementById('tabs');
  const lines = ['Line 1','Line 2','Line 3'];
  tabsEl.innerHTML = lines.map((l,i)=>`<button class="tab ${i===0?'active':''}" data-line="${l}"><span class="dot"></span>${l}</button>`).join('');
  tabsEl.querySelectorAll('.tab').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      tabsEl.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderAll();
    });
  });
}

function initUserbar(){
  const el = document.getElementById('userbar');
  const roleLabel = SESSION.role==='admin' ? 'แอดมิน' : 'หัวหน้ากะผลิต';
  el.innerHTML = `<b>${SESSION.name||SESSION.username}</b><span class="badge ${SESSION.role}">${roleLabel}</span>`;
  if(SESSION.role==='admin'){
    document.getElementById('backBtn').style.display = 'inline-block';
    document.getElementById('backBtn').onclick = ()=> window.location.href='dashboard_home.html';
  }
  document.getElementById('logoutBtn').onclick = ()=>{
    sessionStorage.removeItem('aaf_user');
    window.location.href='login.html';
  };
}

function tickClock(){
  const el = document.getElementById('clock');
  const d = new Date();
  const dowNames = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  const pad = n => String(n).padStart(2,'0');
  el.textContent = `${dowNames[d.getDay()]} ${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()+543}  ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

document.getElementById('monthPicker').value = currentMonth;
document.getElementById('monthPicker').addEventListener('change', (e)=>{
  currentMonth = e.target.value;
  loadMonth(currentMonth);
});

initTabs();
initUserbar();
tickClock();
setInterval(tickClock, 1000);
loadMonth(currentMonth);
</script>
</body>
</html>
