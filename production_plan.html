<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แผนผลิตประจำวัน — AAF</title>
<style>
  :root{
    --bg:#12181b; --panel:#1a2226; --panel2:#202a2f; --ink:#e8edee; --sub:#93a3a8;
    --line1:#e8975a; --line1-soft:#3a2c1f;
    --line2:#5db3d6; --line2-soft:#1c2f38;
    --line3:#8bc48a; --line3-soft:#1f2f22;
    --amber:#f2c14e; --today:#33422f; --grid:#2a3438; --danger:#e06a5f; --ok:#5fbf7a;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Bai Jamjuree','Sarabun','TH Sarabun New','Segoe UI',sans-serif;}
  header{padding:18px 20px 14px;border-bottom:1px solid var(--grid);position:sticky;top:0;background:var(--bg);z-index:30;}
  header .top{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  h1{font-size:1.3rem;margin:0;font-weight:700;}
  h1 small{display:block;font-weight:400;font-size:.76rem;color:var(--sub);margin-top:2px;}
  #clock{font-variant-numeric:tabular-nums;font-size:.9rem;color:var(--sub);}
  .userbar{display:flex;align-items:center;gap:10px;font-size:.85rem;color:var(--sub);}
  .userbar b{color:var(--ink);}
  .badge{padding:2px 9px;border-radius:999px;font-size:.7rem;font-weight:700;}
  .badge.admin{background:#3a2c1f;color:var(--line1);}
  .badge.production{background:#1c2f38;color:var(--line2);}
  .btn{border:1px solid var(--grid);background:var(--panel);color:var(--ink);padding:7px 14px;border-radius:8px;font-size:.82rem;cursor:pointer;font-weight:600;}
  .btn:hover{background:var(--panel2);}
  .btn.primary{background:#1d4ed8;border-color:#1d4ed8;color:#fff;}
  .btn.danger{background:transparent;border-color:var(--danger);color:var(--danger);padding:3px 9px;font-size:.75rem;}
  .toolbar{display:flex;gap:10px;align-items:center;margin-top:14px;flex-wrap:wrap;}
  .toolbar input[type=month]{background:var(--panel);border:1px solid var(--grid);color:var(--ink);padding:7px 10px;border-radius:8px;font-size:.85rem;}
  .tabs{display:flex;gap:8px;}
  .tab{border:1px solid var(--grid);background:var(--panel);color:var(--ink);padding:8px 16px;border-radius:999px;font-size:.88rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;}
  .tab .dot{width:9px;height:9px;border-radius:50%;}
  .tab[data-line="Line 1"] .dot{background:var(--line1);} .tab[data-line="Line 2"] .dot{background:var(--line2);} .tab[data-line="Line 3"] .dot{background:var(--line3);}
  .tab.active{background:var(--panel2);border-color:currentColor;}
  .tab[data-line="Line 1"].active{color:var(--line1);} .tab[data-line="Line 2"].active{color:var(--line2);} .tab[data-line="Line 3"].active{color:var(--line3);}
  #syncstatus{font-size:.75rem;color:var(--sub);}
  #syncstatus.saving{color:var(--amber);}
  #syncstatus.ok{color:var(--ok);}
  #syncstatus.err{color:var(--danger);}

  main{padding:16px 20px 60px;}
  .linewrap{display:none;} .linewrap.active{display:block;}
  .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
  .card{background:var(--panel);border:1px solid var(--grid);border-radius:10px;padding:12px 14px;}
  .card .label{font-size:.7rem;color:var(--sub);text-transform:uppercase;letter-spacing:.03em;}
  .card .value{font-size:1.4rem;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums;}
  .card .value span{font-size:.8rem;font-weight:500;color:var(--sub);}

  .daysrow{display:flex;gap:10px;overflow-x:auto;padding-bottom:14px;}
  .daycard{
    flex:0 0 auto; background:var(--panel); border:1px solid var(--grid); border-radius:12px;
    min-width:158px; overflow:hidden;
  }
  .daycard.today{border-color:var(--amber); box-shadow:0 0 0 1px var(--amber);}
  .daycard .dayhead{
    background:var(--panel2); padding:8px 10px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--grid);
  }
  .daycard .dayhead .num{font-weight:800;font-size:1.05rem;}
  .daycard .dayhead .dow{color:var(--sub);font-size:.72rem;}
  .runcol{border-bottom:1px solid var(--grid); padding:8px 10px;}
  .runcol:last-child{border-bottom:none;}
  .runcol .rowline{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:6px;font-size:.74rem;color:var(--sub);}
  select.thickness-sel, input.hr-input, input.note-input{
    width:100%; background:var(--panel2); border:1px solid var(--grid); color:var(--ink);
    padding:5px 7px; border-radius:6px; font-size:.82rem; margin-bottom:6px;
  }
  .calc-line{display:flex; justify-content:space-between; font-size:.78rem; padding:2px 0;}
  .calc-line .k{color:var(--sub);}
  .calc-line .v{font-variant-numeric:tabular-nums;font-weight:700;}
  .l1 .calc-line .v{color:var(--line1);} .l2 .calc-line .v{color:var(--line2);} .l3 .calc-line .v{color:var(--line3);}
  .emptyday{padding:16px 10px; text-align:center; color:var(--sub); font-size:.82rem;}
  .addrun-btn{
    width:100%; padding:8px; background:none; border:1px dashed var(--grid); color:var(--sub);
    border-radius:8px; cursor:pointer; font-size:.78rem; margin-top:4px;
  }
  .addrun-btn:hover{color:var(--ink); border-color:var(--sub);}
  .rm-btn{background:none;border:none;color:var(--danger);cursor:pointer;font-size:.85rem;padding:0 4px;}

  footer{padding:16px 20px 40px;color:var(--sub);font-size:.78rem;border-top:1px solid var(--grid);margin-top:10px;}
  @media (max-width:640px){ h1{font-size:1.05rem;} }

  .pagenav{display:flex;gap:8px;}
  .pagebtn.active{background:var(--panel2);border-color:var(--ink);}

  .previewbox{background:var(--panel);border:1px solid var(--grid);border-radius:12px;padding:12px;margin-bottom:18px;}
  .previewhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .previewhead b{font-size:.95rem;}
  .tablewrap{overflow-x:auto;border:1px solid var(--grid);border-radius:10px;}
  table.preview-table{border-collapse:collapse;font-size:.76rem;white-space:nowrap;}
  table.preview-table th, table.preview-table td{border-bottom:1px solid var(--grid);border-right:1px solid var(--grid);padding:5px 8px;text-align:center;font-variant-numeric:tabular-nums;}
  table.preview-table thead th{background:var(--panel2);color:var(--sub);position:sticky;top:0;z-index:3;}
  table.preview-table tbody th{text-align:left;background:var(--panel2);color:var(--sub);position:sticky;left:0;z-index:2;white-space:nowrap;}
  table.preview-table tr.line-sep th{background:var(--panel2);font-weight:800;font-size:.82rem;text-align:left;position:sticky;left:0;}
  table.preview-table tr.line-sep.l1 th{color:var(--line1);} table.preview-table tr.line-sep.l2 th{color:var(--line2);} table.preview-table tr.line-sep.l3 th{color:var(--line3);}
  table.preview-table td.l1{color:var(--line1);} table.preview-table td.l2{color:var(--line2);} table.preview-table td.l3{color:var(--line3);}
  input.pv-input{
    width:56px; background:var(--panel2); border:1px solid var(--grid); color:var(--ink);
    padding:3px 4px; border-radius:5px; font-size:.76rem; text-align:center; font-variant-numeric:tabular-nums;
  }
  input.pv-note{width:90px; text-align:left;}
  tr.addrow td{background:var(--panel2);}
  .pv-add-btn, .pv-rm-btn{
    border:1px solid var(--grid); background:var(--panel); color:var(--ink);
    width:22px; height:22px; border-radius:5px; cursor:pointer; font-weight:800; font-size:.85rem; line-height:1;
  }
  .pv-add-btn:hover{background:var(--ok); color:#0d1117; border-color:var(--ok);}
  .pv-rm-btn{margin-left:4px;}
  .pv-rm-btn:hover{background:var(--danger); color:#0d1117; border-color:var(--danger);}

  table.std-table{border-collapse:collapse;width:100%;max-width:520px;}
  table.std-table th, table.std-table td{border-bottom:1px solid var(--grid);padding:8px 12px;text-align:center;}
  table.std-table thead th{background:var(--panel2);color:var(--sub);font-size:.78rem;}
  table.std-table td.thk{text-align:left;font-weight:700;background:var(--panel2);}
  table.std-table th.l1, table.std-table td.l1{color:var(--line1);} table.std-table th.l2, table.std-table td.l2{color:var(--line2);} table.std-table th.l3, table.std-table td.l3{color:var(--line3);}
  input.std-input{width:70px;background:var(--panel2);border:1px solid var(--grid);color:var(--ink);padding:5px 6px;border-radius:6px;text-align:center;font-variant-numeric:tabular-nums;}
  table.size-table{width:auto;}
  input.size-name-input{width:120px;text-align:left;}
  input.size-wl-input{width:56px;}
</style>
</head>
<body>

<header>
  <div class="top">
    <h1>แผนผลิตประจำวัน <small>AAF · Advance Asia Fiber — ระบบแผนผลิตและมาตรฐานโรงงาน</small></h1>
    <div style="display:flex;align-items:center;gap:16px;">
      <div class="userbar" id="userbar"></div>
      <div id="clock"></div>
    </div>
  </div>
  <div class="toolbar">
    <div class="pagenav" id="pagenav">
      <button class="btn pagebtn active" data-page="entry">แผนผลิตรายวัน</button>
      <button class="btn pagebtn" data-page="std">มาตรฐาน</button>
      <button class="btn pagebtn" data-page="eff">ประเมิน Eff</button>
    </div>
    <div class="tabs" id="tabs"></div>
    <input type="month" id="monthPicker">
    <span id="revBadge" style="font-size:.78rem;color:var(--amber);font-weight:700;"></span>
    <span id="syncstatus"></span>
    <span style="flex:1"></span>
    <button class="btn" id="backBtn" style="display:none">← ระบบขาย</button>
    <button class="btn" id="saveBtn" style="display:none">💾 บันทึกข้อมูล</button>
    <button class="btn" id="logoutBtn">ออกจากระบบ</button>
  </div>
</header>

<main id="main"></main>

<footer>
  เป้า 4x8 คำนวณอัตโนมัติจาก: STD P/hr (ตามความหนา+Line) × ชม.ผลิต × Eff ของ Line × จำนวนแผ่นต่อเพรส · ข้อมูลซิงค์ผ่าน Google Sheet แบบเรียลไทม์
</footer>

<script>
/* ============== CONFIG ============== */
const API_ENDPOINT = 'https://script.google.com/macros/s/AKfycbxkh2u5qiN4o9OqrHCTH5N4SSAzNzLGmduJxFakDgLnBpeX6KMwYcKh2mh5hGxLrQwAEg/exec';
const API_SECRET = 'aaf-prodplan-2026'; // ต้องตรงกับ SHARED_SECRET ในไฟล์ Apps Script

/* ============== STANDARDS (จากตาราง KPI) — ค่าเริ่มต้น, แก้ไขได้ผ่านหน้า "มาตรฐาน P/hr" ============== */
const STD_PHR_DEFAULT = {
  1.6:{'Line 1':8.0,'Line 2':8.5,'Line 3':7.0},
  1.8:{'Line 1':7.9,'Line 2':7.8,'Line 3':6.0},
  2.0:{'Line 1':7.8,'Line 2':7.5,'Line 3':7.5},
  2.1:{'Line 1':7.8,'Line 2':7.3,'Line 3':7.2},
  2.2:{'Line 1':7.8,'Line 2':7.3,'Line 3':7.2},
  2.3:{'Line 1':7.5,'Line 2':7.2,'Line 3':7.0},
  2.5:{'Line 1':7.5,'Line 2':7.2,'Line 3':7.0},
  2.7:{'Line 1':7.5,'Line 2':7.0,'Line 3':7.0},
  2.8:{'Line 1':7.3,'Line 2':7.0,'Line 3':6.7},
  3.0:{'Line 1':7.3,'Line 2':6.8,'Line 3':6.7},
  3.2:{'Line 1':7.0,'Line 2':6.8,'Line 3':6.4},
  3.5:{'Line 1':6.0,'Line 2':0.0,'Line 3':6.0},
  3.8:{'Line 1':5.5,'Line 2':0.0,'Line 3':5.5},
  4.0:{'Line 1':4.6,'Line 2':4.5,'Line 3':4.5},
  4.5:{'Line 1':4.3,'Line 2':4.3,'Line 3':4.3},
  4.8:{'Line 1':4.0,'Line 2':3.5,'Line 3':4.0},
  5.0:{'Line 1':3.5,'Line 2':3.0,'Line 3':4.0},
  5.5:{'Line 1':3.3,'Line 2':3.0,'Line 3':3.0},
  6.0:{'Line 1':3.0,'Line 2':3.0,'Line 3':3.0},
  8.0:{'Line 1':0,'Line 2':0,'Line 3':0},
  9.0:{'Line 1':0,'Line 2':0,'Line 3':0},
};
const EFF = {'Line 1':0.76,'Line 2':1.00,'Line 3':0.88}; // ค่าเริ่มต้นสำหรับ "ประเมิน Eff" เท่านั้น ไม่ได้ใช้ในแผนหลัก
let effEvalValues = {'Line 1': EFF['Line 1']*100, 'Line 2': EFF['Line 2']*100, 'Line 3': EFF['Line 3']*100};
const BOARDS_PER_PRESS = {'Line 1':56,'Line 2':40,'Line 3':46};
const LINE_CLASS = {'Line 1':'l1','Line 2':'l2','Line 3':'l3'};
const THICKNESS_LIST = Object.keys(STD_PHR_DEFAULT).map(Number).sort((a,b)=>a-b);
const DOW = ['อา','จ','อ','พ','พฤ','ศ','ส'];
let STD_OVERRIDES = {}; // {thickness: {line: value}} — โหลดจาก backend, ทับค่า default
let sizeStdRows = {};    // rowId -> {name, sheets:[{w,l},...]} (w,l หน่วยเมตร)
let sizeStdColCount = 2; // จำนวนคอลัมน์ "แผ่นที่" ที่แสดง (เพิ่มได้เรื่อยๆ)
function getStdPhr(thickness, line){
  if(thickness===null || thickness===undefined || thickness==='') return 0;
  const t = Number(thickness);
  if(STD_OVERRIDES[t] && STD_OVERRIDES[t][line]!=null && STD_OVERRIDES[t][line]!=='') return Number(STD_OVERRIDES[t][line]);
  return (STD_PHR_DEFAULT[t] ? STD_PHR_DEFAULT[t][line] : 0) || 0;
}

/* ============== AUTH GUARD ============== */
let SESSION = null;
try { SESSION = JSON.parse(sessionStorage.getItem('aaf_user') || 'null'); } catch(e){ SESSION = null; }
if(!SESSION){
  window.location.href = 'login.html';
}
const IS_ADMIN = SESSION && SESSION.role === 'admin';
const CAN_VIEW = SESSION && (SESSION.role === 'admin' || SESSION.role === 'production');
if(!CAN_VIEW){
  window.location.href = 'login.html';
}

/* ============== STATE ============== */
let currentMonth = new Date().toISOString().slice(0,7); // YYYY-MM
let planData = {}; // key `${line}_${day}` -> array of runs {thickness, hours, note}
let saveTimers = {};
let currentPage = 'entry'; // 'entry' | 'std'
let currentStdTab = 'phr'; // 'phr' | 'wood_size' | ... (เพิ่มมาตรฐานใหม่ๆ ได้เรื่อยๆ ในนี้)
const STD_TABS = [
  {key:'phr', label:'มาตรฐาน P/hr'},
  {key:'wood_size', label:'มาตรฐาน ขนาดไม้'},
];
let previewOpen = true;
let currentRev = 0;
let revBumpedForMonth = null; // ป้องกันการนับ rev ซ้ำหลายรอบในเซสชันเดียวกัน

function daysInMonth(ym){
  const [y,m] = ym.split('-').map(Number);
  return new Date(y, m, 0).getDate();
}
function num(v, digits){
  if(v===null||v===undefined||Number.isNaN(Number(v))) return '—';
  digits = digits===undefined?2:digits;
  let s = Number(v).toFixed(digits).replace(/\.0+$/,'').replace(/(\.\d*[1-9])0+$/,'$1');
  let parts = s.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');
  return parts.join('.');
}
function calcRun(line, run){
  const stdphr = getStdPhr(run.thickness, line);
  const hours = Number(run.hours)||0;
  // หมายเหตุ: แผนหลักไม่หัก Eff — ใส่เต็มจำนวนปกติเสมอ Eff ใช้เฉพาะในแผงประเมินสถานการณ์ (ปุ่ม "ประเมิน Eff") เท่านั้น
  const presses = stdphr * hours;
  const boards = presses * BOARDS_PER_PRESS[line];
  return {stdphr, presses, boards};
}

/* ============== SYNC ============== */
function setSyncStatus(state, msg){
  const el = document.getElementById('syncstatus');
  el.className = state;
  el.textContent = msg || (state==='saving'?'กำลังบันทึก...':state==='ok'?'บันทึกแล้ว':state==='err'?'บันทึกไม่สำเร็จ':'');
}

async function loadMonth(ym){
  setSyncStatus('saving','กำลังโหลดข้อมูล...');
  currentRev = 0;
  revBumpedForMonth = null;
  effEvalValues = {'Line 1': EFF['Line 1']*100, 'Line 2': EFF['Line 2']*100, 'Line 3': EFF['Line 3']*100};
  try{
    const res = await fetch(`${API_ENDPOINT}?action=load&month=${ym}`);
    const json = await res.json();
    planData = {};
    if(json.ok){
      Object.keys(json.data).forEach(key=>{
        // key = YYYY-MM_Line X_day  (or YYYY-MM_META_rev for revision counter, or YYYY-MM_EFFCFG_Line X for Eff%)
        const parts = key.split('_');
        const day = parts[parts.length-1];
        const line = parts.slice(1,-1).join('_');
        if(line === 'META' && day === 'rev'){
          const runs = json.data[key];
          currentRev = (runs && runs[0] && runs[0].count) ? Number(runs[0].count) : 0;
          return;
        }
        if(line === 'EFFCFG'){
          const runs = json.data[key];
          const pct = (runs && runs[0] && runs[0].pct!=null) ? Number(runs[0].pct) : null;
          if(pct!==null) effEvalValues[day] = pct; // day ในที่นี้คือชื่อ Line เช่น "Line 1"
          return;
        }
        planData[`${line}_${day}`] = json.data[key] || [];
      });
    }
    setSyncStatus('ok','โหลดข้อมูลล่าสุดแล้ว');
  }catch(err){
    setSyncStatus('err','โหลดข้อมูลไม่สำเร็จ — ตรวจสอบการเชื่อมต่อ API');
    console.error(err);
  }
  updateRevBadge();
  renderAll();
}

function updateRevBadge(){
  const el = document.getElementById('revBadge');
  if(!el) return;
  const [y,m] = currentMonth.split('-');
  const yy = y.slice(2);
  el.textContent = currentRev > 0 ? `${m}-${yy} Rev.${String(currentRev).padStart(2,'0')}` : `${m}-${yy} (ยังไม่มีการแก้ไข)`;
}

async function bumpRevision(ym){
  currentRev += 1;
  updateRevBadge();
  try{
    await fetch(API_ENDPOINT, {
      method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({
        secret: API_SECRET, month: ym, line: 'META', day: 'rev',
        runs: [{count: currentRev}], updatedBy: SESSION.username,
      }),
    });
  }catch(err){ console.error('bumpRevision error', err); }
}

async function loadStdConfig(){
  try{
    const res = await fetch(`${API_ENDPOINT}?action=load&month=STD`);
    const json = await res.json();
    STD_OVERRIDES = {};
    if(json.ok){
      Object.keys(json.data).forEach(key=>{
        // key = STD_Line X_thickness
        const parts = key.split('_');
        const thickness = parts[parts.length-1];
        const line = parts.slice(1,-1).join('_');
        const runs = json.data[key];
        const val = (runs && runs[0] && runs[0].value!=null) ? runs[0].value : null;
        if(val!==null){
          if(!STD_OVERRIDES[thickness]) STD_OVERRIDES[thickness] = {};
          STD_OVERRIDES[thickness][line] = Number(val);
        }
      });
    }
  }catch(err){ console.error('loadStdConfig error', err); }
  if(currentPage==='std') renderAll();
}

async function loadSizeStdConfig(){
  try{
    const res = await fetch(`${API_ENDPOINT}?action=load&month=SIZESTD`);
    const json = await res.json();
    sizeStdRows = {};
    if(json.ok){
      Object.keys(json.data).forEach(key=>{
        // key = SIZESTD_row_<rowId>
        const parts = key.split('_');
        const rowId = parts[parts.length-1];
        const runs = json.data[key];
        const rowObj = (runs && runs[0]) ? runs[0] : null;
        if(rowObj){
          sizeStdRows[rowId] = {
            name: rowObj.name || '',
            sheets: Array.isArray(rowObj.sheets) ? rowObj.sheets : [],
          };
          sizeStdColCount = Math.max(sizeStdColCount, rowObj.sheets ? rowObj.sheets.length : 0);
        }
      });
    }
  }catch(err){ console.error('loadSizeStdConfig error', err); }
  if(currentPage==='std') renderAll();
}

/* ============== DIRTY TRACKING (แก้ไขสะสมไว้ก่อน กดปุ่ม "บันทึกข้อมูล" ทีเดียว) ============== */
let dirtyDays = new Set();  // keys `${line}_${day}`
let dirtyStd = new Set();   // keys `${thickness}||${line}`
let dirtySizeRows = new Set(); // rowIds ของ "มาตรฐานขนาดไม้" ที่แก้ไขแล้ว
let dirtyEff = new Set(); // ชื่อ Line ที่แก้ % Eff แล้ว

function markDirtyDay(line, day){ dirtyDays.add(`${line}_${day}`); updateDirtyIndicator(); }
function markDirtyStd(thickness, line){ dirtyStd.add(`${thickness}||${line}`); updateDirtyIndicator(); }
function markDirtySizeRow(rowId){ dirtySizeRows.add(rowId); updateDirtyIndicator(); }
function markDirtyEff(line){ dirtyEff.add(line); updateDirtyIndicator(); }

function updateDirtyIndicator(){
  const el = document.getElementById('syncstatus');
  const btn = document.getElementById('saveBtn');
  const n = dirtyDays.size + dirtyStd.size + dirtySizeRows.size + dirtyEff.size;
  if(!el) return;
  if(n > 0){
    el.className = 'saving';
    el.textContent = `มีการแก้ไข ${n} รายการที่ยังไม่บันทึก`;
    if(btn) btn.classList.add('primary');
  } else {
    el.className = 'ok';
    el.textContent = 'บันทึกล่าสุดแล้ว';
    if(btn) btn.classList.remove('primary');
  }
}

async function saveAllChanges(){
  if(!IS_ADMIN) return;
  const btn = document.getElementById('saveBtn');
  const total = dirtyDays.size + dirtyStd.size + dirtySizeRows.size + dirtyEff.size;
  if(total === 0){
    setSyncStatus('ok', 'ไม่มีการเปลี่ยนแปลงที่ต้องบันทึก');
    return;
  }
  btn.disabled = true;
  let done = 0;
  setSyncStatus('saving', `กำลังบันทึก... (0/${total})`);

  for(const key of Array.from(dirtyDays)){
    const us = key.lastIndexOf('_');
    const line = key.slice(0, us);
    const day = key.slice(us+1);
    try{
      await fetch(API_ENDPOINT, {
        method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({
          secret: API_SECRET, month: currentMonth, line, day,
          runs: planData[key] || [], updatedBy: SESSION.username,
        }),
      });
      dirtyDays.delete(key);
    }catch(err){ console.error('save day error', key, err); }
    done++;
    setSyncStatus('saving', `กำลังบันทึก... (${done}/${total})`);
  }

  for(const key of Array.from(dirtyStd)){
    const [thickness, line] = key.split('||');
    const value = (STD_OVERRIDES[thickness] && STD_OVERRIDES[thickness][line]!=null) ? STD_OVERRIDES[thickness][line] : null;
    try{
      await fetch(API_ENDPOINT, {
        method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({
          secret: API_SECRET, month:'STD', line, day: thickness,
          runs: [{value}], updatedBy: SESSION.username,
        }),
      });
      dirtyStd.delete(key);
    }catch(err){ console.error('save std error', key, err); }
    done++;
    setSyncStatus('saving', `กำลังบันทึก... (${done}/${total})`);
  }

  for(const rowId of Array.from(dirtySizeRows)){
    const row = sizeStdRows[rowId];
    const runs = row ? [{name: row.name, sheets: row.sheets}] : [];
    try{
      await fetch(API_ENDPOINT, {
        method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({
          secret: API_SECRET, month:'SIZESTD', line:'row', day: rowId,
          runs, updatedBy: SESSION.username,
        }),
      });
      dirtySizeRows.delete(rowId);
      if(!row) delete sizeStdRows[rowId];
    }catch(err){ console.error('save size row error', rowId, err); }
    done++;
    setSyncStatus('saving', `กำลังบันทึก... (${done}/${total})`);
  }

  for(const line of Array.from(dirtyEff)){
    const pct = effEvalValues[line];
    try{
      await fetch(API_ENDPOINT, {
        method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({
          secret: API_SECRET, month: currentMonth, line:'EFFCFG', day: line,
          runs: [{pct}], updatedBy: SESSION.username,
        }),
      });
      dirtyEff.delete(line);
    }catch(err){ console.error('save eff error', line, err); }
    done++;
    setSyncStatus('saving', `กำลังบันทึก... (${done}/${total})`);
  }

  if(revBumpedForMonth !== currentMonth){
    revBumpedForMonth = currentMonth;
    await bumpRevision(currentMonth);
  }

  btn.disabled = false;
  updateDirtyIndicator();
  alert('บันทึกข้อมูลเรียบร้อยแล้ว');
}

/* ============== RENDER ============== */
function dowForDay(ym, dayNum){
  const [y,m] = ym.split('-').map(Number);
  return DOW[new Date(y, m-1, dayNum).getDay()];
}

function thicknessOptions(selected){
  let html = `<option value="">—เลือก—</option>`;
  THICKNESS_LIST.forEach(t=>{
    html += `<option value="${t}" ${Number(selected)===t?'selected':''}>${t}</option>`;
  });
  return html;
}

function buildDayCard(line, ym, dayNum, isToday){
  const key = `${line}_${dayNum}`;
  const runs = planData[key] || [];
  const cls = LINE_CLASS[line];
  let html = `<div class="daycard ${isToday?'today':''}" data-key="${key}">
    <div class="dayhead"><span class="num">${dayNum}</span><span class="dow">${dowForDay(ym,dayNum)}</span></div>`;

  if(runs.length===0){
    html += `<div class="emptyday ${cls}">ไม่มีแผน</div>`;
  } else {
    runs.forEach((run, ri)=>{
      const c = calcRun(line, run);
      html += `<div class="runcol ${cls}" data-idx="${ri}">`;
      if(IS_ADMIN){
        html += `<div class="rowline"><span>รอบที่ ${ri+1}</span><button class="rm-btn" onclick="removeRun('${line}',${dayNum},${ri})">ลบ ✕</button></div>
          <select class="thickness-sel" onchange="updateRun('${line}',${dayNum},${ri},'thickness',this.value)">${thicknessOptions(run.thickness)}</select>
          <input class="hr-input" type="number" min="0" step="0.5" placeholder="ชม.ผลิต" value="${run.hours||''}" onchange="updateRun('${line}',${dayNum},${ri},'hours',this.value)">
          <input class="note-input" type="text" placeholder="หมายเหตุ" value="${run.note||''}" onchange="updateRun('${line}',${dayNum},${ri},'note',this.value)">`;
      } else {
        html += `<div class="rowline"><span>รอบที่ ${ri+1}</span><span>${run.thickness?run.thickness+' mm.':'—'}</span></div>`;
      }
      html += `<div class="calc-line"><span class="k">P/hr STD</span><span class="v">${num(c.stdphr,1)}</span></div>
        <div class="calc-line"><span class="k">จำนวนเพรส</span><span class="v">${num(c.presses,1)}</span></div>
        <div class="calc-line"><span class="k">เป้า 4x8</span><span class="v">${num(c.boards,0)}</span></div>`;
      if(!IS_ADMIN && run.note){
        html += `<div class="calc-line" style="color:var(--amber)"><span class="k">หมายเหตุ</span><span class="v">${run.note}</span></div>`;
      }
      html += `</div>`;
    });
  }
  if(IS_ADMIN){
    html += `<button class="addrun-btn" onclick="addRun('${line}',${dayNum})">+ เพิ่มรอบ</button>`;
  }
  html += `</div>`;
  return html;
}

function buildLine(line){
  const ym = currentMonth;
  const nd = daysInMonth(ym);
  const todayStr = new Date().toISOString().slice(0,10);
  const todayDay = todayStr.slice(0,7)===ym ? Number(todayStr.slice(8,10)) : -1;

  let totalTarget=0, activeDays=0, thicknessSet=new Set();
  for(let d=1; d<=nd; d++){
    const runs = planData[`${line}_${d}`] || [];
    if(runs.length) activeDays++;
    runs.forEach(r=>{
      const c = calcRun(line, r);
      totalTarget += c.boards;
      if(r.thickness) thicknessSet.add(r.thickness);
    });
  }

  let html = `<div class="summary">
    <div class="card"><div class="label">รวมเป้าเดือนนี้</div><div class="value">${num(totalTarget,0)} <span>แผ่น 4x8</span></div></div>
    <div class="card"><div class="label">วันเดินเครื่อง</div><div class="value">${activeDays} <span>/ ${nd} วัน</span></div></div>
    <div class="card"><div class="label">ความหนาที่ใช้เดือนนี้</div><div class="value" style="font-size:1rem;">${[...thicknessSet].sort((a,b)=>a-b).join(', ')||'—'} <span>mm.</span></div></div>
  </div>`;

  html += `<div class="daysrow">`;
  for(let d=1; d<=nd; d++){
    html += buildDayCard(line, ym, d, d===todayDay);
  }
  html += `</div>`;
  return html;
}

function buildPreviewAll(){
  const ym = currentMonth;
  const nd = daysInMonth(ym);
  const lines = ['Line 1','Line 2','Line 3'];
  const dayRunsCount = [];
  for(let d=1; d<=nd; d++){
    let maxRuns = 1;
    lines.forEach(line=>{
      const runs = planData[`${line}_${d}`] || [];
      maxRuns = Math.max(maxRuns, runs.length || 1);
    });
    dayRunsCount.push(maxRuns);
  }
  const totalCols = 1 + dayRunsCount.reduce((a,b)=>a+b,0);

  let html = `<div class="tablewrap"><table class="preview-table"><thead><tr class="dayheader"><th class="rowlabel-corner">Line / วันที่</th>`;
  for(let d=1; d<=nd; d++){
    html += `<th colspan="${dayRunsCount[d-1]}">${d}</th>`;
  }
  html += `</tr></thead><tbody>`;

  lines.forEach(line=>{
    const cls = LINE_CLASS[line];
    html += `<tr class="line-sep ${cls}"><th colspan="${totalCols}">${line}</th></tr>`;

    // ความหนา (แก้ไขได้)
    html += `<tr><th>ความหนา</th>`;
    for(let d=1; d<=nd; d++){
      const runs = planData[`${line}_${d}`] || [];
      const cols = dayRunsCount[d-1];
      for(let i=0; i<cols; i++){
        const run = runs[i];
        if(IS_ADMIN){
          const v = run && run.thickness!==null && run.thickness!==undefined ? run.thickness : '';
          html += `<td class="${cls}"><input type="number" step="0.1" class="pv-input pv-thk" value="${v}"
            onchange="updateRun('${line}',${d},${i},'thickness',this.value)"></td>`;
        } else {
          const v = run && run.thickness ? run.thickness : '—';
          html += `<td class="${cls}">${v}</td>`;
        }
      }
    }
    html += `</tr>`;

    // เป้า 4x8 (คำนวณอัตโนมัติ)
    html += `<tr><th>เป้า 4x8</th>`;
    for(let d=1; d<=nd; d++){
      const runs = planData[`${line}_${d}`] || [];
      const cols = dayRunsCount[d-1];
      for(let i=0; i<cols; i++){
        const run = runs[i];
        const val = run ? num(calcRun(line, run).boards, 0) : '—';
        html += `<td class="${cls}">${val}</td>`;
      }
    }
    html += `</tr>`;

    // P/hr เป้า (คำนวณอัตโนมัติ)
    html += `<tr><th>P/hr เป้า</th>`;
    for(let d=1; d<=nd; d++){
      const runs = planData[`${line}_${d}`] || [];
      const cols = dayRunsCount[d-1];
      for(let i=0; i<cols; i++){
        const run = runs[i];
        const val = run ? num(calcRun(line, run).stdphr, 1) : '—';
        html += `<td class="${cls}">${val}</td>`;
      }
    }
    html += `</tr>`;

    // ชม.ผลิต (แก้ไขได้)
    html += `<tr><th>ชม.ผลิต</th>`;
    for(let d=1; d<=nd; d++){
      const runs = planData[`${line}_${d}`] || [];
      const cols = dayRunsCount[d-1];
      for(let i=0; i<cols; i++){
        const run = runs[i];
        if(IS_ADMIN){
          const v = run && run.hours!==null && run.hours!==undefined ? run.hours : '';
          html += `<td class="${cls}"><input type="number" step="0.5" min="0" class="pv-input pv-hr" value="${v}"
            onchange="updateRun('${line}',${d},${i},'hours',this.value)"></td>`;
        } else {
          const v = run && (run.hours!==null && run.hours!==undefined && run.hours!=='') ? run.hours : '—';
          html += `<td class="${cls}">${v}</td>`;
        }
      }
    }
    html += `</tr>`;

    // หมายเหตุ (แก้ไขได้)
    html += `<tr><th>หมายเหตุ</th>`;
    for(let d=1; d<=nd; d++){
      const runs = planData[`${line}_${d}`] || [];
      const cols = dayRunsCount[d-1];
      for(let i=0; i<cols; i++){
        const run = runs[i];
        if(IS_ADMIN){
          const v = run && run.note ? run.note : '';
          html += `<td class="${cls}"><input type="text" class="pv-input pv-note" value="${v}"
            onchange="updateRun('${line}',${d},${i},'note',this.value)"></td>`;
        } else {
          html += `<td class="${cls}">${run && run.note ? run.note : ''}</td>`;
        }
      }
    }
    html += `</tr>`;

    // แถว + เพิ่มรอบ / ลบรอบ (เฉพาะแอดมิน) — หนึ่งช่องต่อวัน (ไม่ใช่ต่อรอบ)
    if(IS_ADMIN){
      html += `<tr class="addrow">`;
      for(let d=1; d<=nd; d++){
        const runs = planData[`${line}_${d}`] || [];
        const cols = dayRunsCount[d-1];
        html += `<td colspan="${cols}">
          <button class="pv-add-btn" onclick="addRun('${line}',${d})" title="เพิ่มความหนา/รอบใหม่ในวันนี้">+</button>
          ${runs.length>0 ? `<button class="pv-rm-btn" onclick="previewRemoveLastRun('${line}',${d})" title="ลบรอบสุดท้ายของวันนี้">−</button>` : ''}
        </td>`;
      }
      html += `</tr>`;
    }
  });
  html += `</tbody></table></div>`;
  return html;
}

function calcSizeRowArea(row){
  if(!row || !Array.isArray(row.sheets)) return 0;
  return row.sheets.reduce((sum, s)=>{
    const w = Number(s && s.w) || 0;
    const l = Number(s && s.l) || 0;
    return sum + (w * l);
  }, 0);
}

function findNormalRowArea(){
  for(const rid of Object.keys(sizeStdRows)){
    const row = sizeStdRows[rid];
    if(row && row.name && row.name.trim().toLowerCase() === 'normal'){
      return calcSizeRowArea(row);
    }
  }
  return 0;
}

function renderStdWoodSizeTab(){
  const rowIds = Object.keys(sizeStdRows).filter(rid => sizeStdRows[rid]);
  const normalArea = findNormalRowArea();

  let html = `<div style="margin-bottom:14px;color:var(--sub);font-size:.85rem;">
    มาตรฐานขนาดไม้ FG — กว้าง×ยาว หน่วย <b>เมตร</b> (เช่น พิมพ์ 1.22 = 1220 mm.) — ${IS_ADMIN ? 'แก้ไข/เพิ่มขนาดได้เฉพาะแอดมิน' : 'ดูอย่างเดียว'}
  </div>`;
  html += `<div class="tablewrap"><table class="std-table size-table"><thead><tr><th>ชื่อขนาด</th>`;
  for(let c=1; c<=sizeStdColCount; c++){
    html += `<th>แผ่นที่ ${c}</th>`;
  }
  html += `<th>รวม พท. (ตร.ม.)</th><th>เท่าของมาตรฐาน</th>${IS_ADMIN ? '<th></th>' : ''}</tr></thead><tbody>`;

  rowIds.forEach(rid=>{
    const row = sizeStdRows[rid];
    const area = calcSizeRowArea(row);
    const ratio = normalArea > 0 ? area / normalArea : null;
    html += `<tr>`;
    if(IS_ADMIN){
      html += `<td><input type="text" class="std-input size-name-input" value="${row.name||''}" placeholder="ชื่อขนาด" onchange="updateSizeRowName('${rid}',this.value)"></td>`;
    } else {
      html += `<td class="thk">${row.name||'—'}</td>`;
    }
    for(let c=0; c<sizeStdColCount; c++){
      const sheet = row.sheets[c] || {w:'', l:''};
      if(IS_ADMIN){
        html += `<td>
          <input type="number" step="0.01" min="0" class="std-input size-wl-input" placeholder="กว้าง" value="${sheet.w||''}" onchange="updateSizeSheet('${rid}',${c},'w',this.value)">
          ×
          <input type="number" step="0.01" min="0" class="std-input size-wl-input" placeholder="ยาว" value="${sheet.l||''}" onchange="updateSizeSheet('${rid}',${c},'l',this.value)">
        </td>`;
      } else {
        html += `<td>${(sheet.w && sheet.l) ? `${sheet.w}×${sheet.l}` : '—'}</td>`;
      }
    }
    html += `<td>${area>0 ? num(area,3) : '—'}</td>`;
    html += `<td>${ratio!==null ? num(ratio,3) : '—'}</td>`;
    if(IS_ADMIN){
      html += `<td><button class="rm-btn" onclick="removeSizeRow('${rid}')">ลบ ✕</button></td>`;
    }
    html += `</tr>`;
  });

  html += `</tbody></table></div>`;

  if(IS_ADMIN){
    html += `<div style="display:flex;gap:10px;margin-top:12px;">
      <button class="btn" onclick="addSizeRow()">+ เพิ่มขนาด</button>
      <button class="btn" onclick="addSizeSheetCol()">+ เพิ่มแผ่นที่</button>
    </div>`;
  }
  return html;
}

      <span class="${cls}" style="font-weight:700;">${line} — Eff (%)</span>
      <input type="number" min="0" max="150" step="1" class="std-input" style="width:80px" ${IS_ADMIN?'':'disabled'}
        value="${effEvalValues[line]}" onchange="updateEffEval('${line}',this.value)">
    </label>`;
  });
  html += `</div>`;

  html += `<div class="tablewrap"><table class="preview-table"><thead><tr><th class="rowlabel-corner">Line / วันที่</th>`;
  for(let d=1; d<=nd; d++) html += `<th>${d}</th>`;
  html += `<th>รวมเดือน</th></tr></thead><tbody>`;

  lines.forEach(line=>{
    const cls = LINE_CLASS[line];
    const pct = (Number(effEvalValues[line])||0) / 100;
    let monthTotal = 0;
    html += `<tr><th class="${cls}">${line} (Eff ${effEvalValues[line]}%)</th>`;
    for(let d=1; d<=nd; d++){
      const runs = planData[`${line}_${d}`] || [];
      let dayTotal = 0;
      runs.forEach(r=> dayTotal += calcRun(line, r).boards);
      const effDay = dayTotal * pct;
      monthTotal += effDay;
      html += `<td class="${cls}">${effDay>0 ? num(effDay,0) : '—'}</td>`;
    }
    html += `<td class="${cls}" style="font-weight:800;">${num(monthTotal,0)}</td>`;
    html += `</tr>`;
  });
  html += `</tbody></table></div>`;
  mainEl.innerHTML = html;

  const effMonthPicker = document.getElementById('effMonthPicker');
  if(effMonthPicker){
    effMonthPicker.addEventListener('change', (e)=>{
      currentMonth = e.target.value;
      document.getElementById('monthPicker').value = currentMonth;
      loadMonth(currentMonth);
    });
  }
}

function revBadgeText(){
  const [y,m] = currentMonth.split('-');
  const yy = y.slice(2);
  return currentRev > 0 ? `${m}-${yy} Rev.${String(currentRev).padStart(2,'0')}` : `${m}-${yy} (ยังไม่มีการแก้ไข)`;
}

function renderAll(){
  document.getElementById('tabs').style.display = currentPage==='entry' ? 'flex' : 'none';
  document.getElementById('monthPicker').style.display = currentPage==='entry' ? 'inline-block' : 'none';
  document.getElementById('revBadge').style.display = currentPage==='entry' ? 'inline' : 'none';
  if(currentPage==='std'){ renderStdPage(); return; }
  if(currentPage==='eff'){ renderEffPage(); return; }
  renderEntryPage();
}

/* ============== EVENT HANDLERS (exposed to window for inline handlers) ============== */
window.updateRun = function(line, day, idx, field, value){
  const key = `${line}_${day}`;
  if(!planData[key]) planData[key] = [];
  if(!planData[key][idx]) planData[key][idx] = {};
  if(field==='thickness') value = value ? Number(value) : '';
  if(field==='hours') value = value ? Number(value) : '';
  planData[key][idx][field] = value;
  renderAll();
  markDirtyDay(line, day);
};
window.addRun = function(line, day){
  const key = `${line}_${day}`;
  if(!planData[key]) planData[key] = [];
  planData[key].push({thickness:'', hours:'', note:''});
  renderAll();
  markDirtyDay(line, day);
};
window.removeRun = function(line, day, idx){
  const key = `${line}_${day}`;
  if(planData[key]){
    planData[key].splice(idx,1);
  }
  renderAll();
  markDirtyDay(line, day);
};
window.previewRemoveLastRun = function(line, day){
  const key = `${line}_${day}`;
  if(planData[key] && planData[key].length > 0){
    planData[key].pop();
    renderAll();
    markDirtyDay(line, day);
  }
};
window.updateStd = function(thickness, line, value){
  value = (value===''||value===null||value===undefined) ? null : Number(value);
  if(!STD_OVERRIDES[thickness]) STD_OVERRIDES[thickness] = {};
  STD_OVERRIDES[thickness][line] = value;
  renderAll();
  markDirtyStd(thickness, line);
};

window.updateEffEval = function(line, value){
  effEvalValues[line] = Number(value) || 0;
  renderAll();
  markDirtyEff(line);
};
window.updateSizeRowName = function(rowId, value){
  if(!sizeStdRows[rowId]) sizeStdRows[rowId] = {name:'', sheets:[]};
  sizeStdRows[rowId].name = value;
  renderAll();
  markDirtySizeRow(rowId);
};
window.updateSizeSheet = function(rowId, slotIdx, field, value){
  if(!sizeStdRows[rowId]) sizeStdRows[rowId] = {name:'', sheets:[]};
  if(!sizeStdRows[rowId].sheets[slotIdx]) sizeStdRows[rowId].sheets[slotIdx] = {w:'', l:''};
  sizeStdRows[rowId].sheets[slotIdx][field] = value === '' ? '' : Number(value);
  renderAll();
  markDirtySizeRow(rowId);
};
window.addSizeRow = function(){
  const rowId = String(Date.now());
  sizeStdRows[rowId] = {name:'', sheets:[]};
  renderAll();
  markDirtySizeRow(rowId);
};
window.addSizeSheetCol = function(){
  sizeStdColCount += 1;
  renderAll();
};
window.removeSizeRow = function(rowId){
  if(!confirm('ลบขนาดนี้ออกจากมาตรฐาน?')) return;
  sizeStdRows[rowId] = null; // null = ถูกลบ รอบันทึกส่ง runs ว่างไปทับที่ backend
  renderAll();
  markDirtySizeRow(rowId);
};

/* ============== INIT ============== */
function initTabs(){
  const tabsEl = document.getElementById('tabs');
  const lines = ['Line 1','Line 2','Line 3'];
  tabsEl.innerHTML = lines.map((l,i)=>`<button class="tab ${i===0?'active':''}" data-line="${l}"><span class="dot"></span>${l}</button>`).join('');
  tabsEl.querySelectorAll('.tab').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      tabsEl.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderAll();
    });
  });
}

function initPageNav(){
  const nav = document.getElementById('pagenav');
  nav.querySelectorAll('.pagebtn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      nav.querySelectorAll('.pagebtn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentPage = btn.dataset.page;
      renderAll();
    });
  });
}

function initUserbar(){
  const el = document.getElementById('userbar');
  const roleLabel = SESSION.role==='admin' ? 'แอดมิน' : 'หัวหน้ากะผลิต';
  el.innerHTML = `<b>${SESSION.name||SESSION.username}</b><span class="badge ${SESSION.role}">${roleLabel}</span>`;
  if(SESSION.role==='admin'){
    document.getElementById('backBtn').style.display = 'inline-block';
    document.getElementById('backBtn').onclick = ()=> window.location.href='dashboard_home.html';
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.style.display = 'inline-block';
    saveBtn.onclick = saveAllChanges;
    updateDirtyIndicator();
    window.addEventListener('beforeunload', (e)=>{
      if(dirtyDays.size + dirtyStd.size > 0){
        e.preventDefault();
        e.returnValue = '';
      }
    });
  }
  document.getElementById('logoutBtn').onclick = ()=>{
    if(IS_ADMIN && (dirtyDays.size + dirtyStd.size > 0)){
      if(!confirm('มีข้อมูลที่ยังไม่ได้บันทึก ต้องการออกจากระบบเลยหรือไม่?')) return;
    }
    sessionStorage.removeItem('aaf_user');
    window.location.href='login.html';
  };
}


function tickClock(){
  const el = document.getElementById('clock');
  const d = new Date();
  const dowNames = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  const pad = n => String(n).padStart(2,'0');
  el.textContent = `${dowNames[d.getDay()]} ${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()+543}  ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

document.getElementById('monthPicker').value = currentMonth;
document.getElementById('monthPicker').addEventListener('change', (e)=>{
  currentMonth = e.target.value;
  loadMonth(currentMonth);
});

initTabs();
initPageNav();
initUserbar();
tickClock();
setInterval(tickClock, 1000);
loadMonth(currentMonth);
loadStdConfig();
loadSizeStdConfig();
</script>
</body>
</html>
